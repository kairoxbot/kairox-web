<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Iniciar Sesión — SentinelBot</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Exo+2:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #020817; --surface: #040f1e; --card: rgba(8,22,45,0.85);
      --accent: #0ea5e9; --accent2: #00d4ff; --glow: rgba(0,212,255,.15);
      --text1: #f0f9ff; --text2: #94a3b8; --border: rgba(14,165,233,.2);
      --danger: #ef4444; --success: #22c55e;
    }
    *, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }
    body { min-height:100vh; background:var(--bg); font-family:'Exo 2',sans-serif; display:flex; align-items:center; justify-content:center; overflow:hidden; }
    canvas#bg { position:fixed; inset:0; z-index:0; }
    .page { position:relative; z-index:10; width:100%; max-width:440px; padding:24px; }

    .back-link { display:inline-flex; align-items:center; gap:8px; color:var(--text2); font-size:13px; text-decoration:none; margin-bottom:28px; transition:color .2s; letter-spacing:.5px; }
    .back-link:hover { color:var(--accent2); }

    .card {
      background:var(--card); border:1px solid var(--border);
      border-radius:20px; padding:44px 40px;
      backdrop-filter:blur(30px) saturate(150%);
      box-shadow:0 0 80px rgba(0,0,0,.6), 0 0 40px var(--glow);
      position:relative; overflow:hidden;
    }
    .card::before {
      content:''; position:absolute; top:0; left:0; right:0; height:2px;
      background:linear-gradient(90deg,transparent,var(--accent),var(--accent2),var(--accent),transparent);
    }
    .card-logo { text-align:center; margin-bottom:32px; }
    .card-logo .icon { font-size:44px; display:block; margin-bottom:12px; filter:drop-shadow(0 0 16px var(--accent2)); animation:pulse 3s ease-in-out infinite; }
    @keyframes pulse { 0%,100%{filter:drop-shadow(0 0 10px var(--accent2))} 50%{filter:drop-shadow(0 0 25px var(--accent2)) drop-shadow(0 0 50px var(--accent))} }
    .card-logo h1 { font-family:'Orbitron',monospace; font-size:22px; font-weight:900; color:var(--text1); letter-spacing:3px; }
    .card-logo h1 span { color:var(--accent2); }
    .card-logo p { color:var(--text2); font-size:13px; margin-top:6px; letter-spacing:.5px; }

    .form-group { margin-bottom:20px; }
    label { display:block; font-size:12px; font-weight:600; letter-spacing:1.5px; text-transform:uppercase; color:var(--text2); margin-bottom:8px; }
    .input-wrap { position:relative; }
    .input-icon { position:absolute; left:14px; top:50%; transform:translateY(-50%); font-size:16px; pointer-events:none; }
    input {
      width:100%; background:rgba(4,15,30,0.8); border:1px solid var(--border);
      border-radius:10px; padding:13px 14px 13px 44px;
      color:var(--text1); font-family:'Exo 2',sans-serif; font-size:15px;
      outline:none; transition:all .25s;
    }
    input:focus { border-color:var(--accent); box-shadow:0 0 0 3px rgba(14,165,233,.12), 0 0 20px rgba(14,165,233,.08); }
    input::placeholder { color:#334155; }
    input.error { border-color:var(--danger); box-shadow:0 0 0 3px rgba(239,68,68,.1); }
    .input-toggle { position:absolute; right:14px; top:50%; transform:translateY(-50%); background:none; border:none; color:var(--text2); cursor:pointer; font-size:16px; transition:color .2s; }
    .input-toggle:hover { color:var(--accent2); }

    .form-row { display:flex; justify-content:space-between; align-items:center; margin-bottom:8px; }
    .remember { display:flex; align-items:center; gap:8px; cursor:pointer; }
    .remember input[type=checkbox] { width:auto; padding:0; accent-color:var(--accent); width:16px; height:16px; cursor:pointer; }
    .remember span { color:var(--text2); font-size:13px; }
    .forgot { color:var(--accent); font-size:13px; text-decoration:none; transition:color .2s; }
    .forgot:hover { color:var(--accent2); }

    .btn-submit {
      width:100%; padding:14px; background:linear-gradient(135deg,#0284c7,#0ea5e9,#00c4f0);
      color:#fff; border:none; border-radius:10px;
      font-family:'Orbitron',monospace; font-size:13px; font-weight:700; letter-spacing:2px;
      cursor:pointer; margin-top:8px;
      box-shadow:0 0 30px rgba(14,165,233,.35);
      transition:all .25s; position:relative; overflow:hidden;
    }
    .btn-submit:hover { transform:translateY(-2px); box-shadow:0 0 50px rgba(14,165,233,.5); }
    .btn-submit:active { transform:translateY(0); }
    .btn-submit:disabled { opacity:.6; cursor:not-allowed; transform:none; }
    .btn-submit .spinner { display:none; width:18px; height:18px; border:2px solid rgba(255,255,255,.3); border-top-color:#fff; border-radius:50%; animation:spin .6s linear infinite; margin:0 auto; }
    .btn-submit.loading .btn-text { display:none; }
    .btn-submit.loading .spinner { display:block; }
    @keyframes spin { to{transform:rotate(360deg)} }

    .divider { display:flex; align-items:center; gap:16px; margin:24px 0; }
    .divider::before, .divider::after { content:''; flex:1; height:1px; background:var(--border); }
    .divider span { color:var(--text2); font-size:12px; letter-spacing:1px; white-space:nowrap; }

    .alert { padding:12px 16px; border-radius:8px; font-size:13px; margin-bottom:16px; display:flex; align-items:center; gap:10px; animation:slideIn .3s ease; }
    @keyframes slideIn { from{opacity:0;transform:translateY(-8px)} to{opacity:1;transform:translateY(0)} }
    .alert-error { background:rgba(239,68,68,.1); border:1px solid rgba(239,68,68,.25); color:#fca5a5; }
    .alert-success { background:rgba(34,197,94,.1); border:1px solid rgba(34,197,94,.25); color:#86efac; }
    .alert-info { background:rgba(14,165,233,.1); border:1px solid rgba(14,165,233,.25); color:#7dd3fc; }

    .register-link { text-align:center; margin-top:24px; color:var(--text2); font-size:14px; }
    .register-link a { color:var(--accent2); text-decoration:none; font-weight:600; transition:color .2s; }
    .register-link a:hover { color:#fff; }

    .security-note { margin-top:20px; padding:12px 16px; background:rgba(14,165,233,.04); border:1px solid rgba(14,165,233,.12); border-radius:8px; display:flex; align-items:center; gap:10px; }
    .security-note span { color:var(--text2); font-size:12px; line-height:1.5; }
    .security-note .icon { font-size:18px; flex-shrink:0; }
  </style>
</head>
<body>
<canvas id="bg"></canvas>
<div class="page">
  <a href="/" class="back-link">← Volver al inicio</a>
  <div class="card">
    <div class="card-logo">
      <span class="icon">🛡️</span>
      <h1>SENTINEL<span>BOT</span></h1>
      <p>Inicia sesión en tu panel de seguridad</p>
    </div>

    <div id="alert-container"></div>

    <form id="loginForm" autocomplete="on">
      <div class="form-group">
        <label>Email o usuario</label>
        <div class="input-wrap">
          <span class="input-icon">📧</span>
          <input type="text" id="email" name="email" placeholder="tu@email.com" autocomplete="username" required>
        </div>
      </div>
      <div class="form-group">
        <div class="form-row">
          <label style="margin-bottom:0">Contraseña</label>
          <a href="/forgot-password" class="forgot">¿Olvidaste tu contraseña?</a>
        </div>
        <div class="input-wrap" style="margin-top:8px">
          <span class="input-icon">🔒</span>
          <input type="password" id="password" name="password" placeholder="••••••••" autocomplete="current-password" required>
          <button type="button" class="input-toggle" id="togglePwd">👁️</button>
        </div>
      </div>
      <div class="form-row" style="margin-bottom:24px">
        <label class="remember">
          <input type="checkbox" id="remember"> <span>Mantener sesión</span>
        </label>
      </div>
      <button type="submit" class="btn-submit" id="submitBtn">
        <span class="btn-text">INICIAR SESIÓN</span>
        <div class="spinner"></div>
      </button>
    </form>

    <div class="security-note">
      <span class="icon">🔐</span>
      <span>Conexión segura con JWT. Tu información está encriptada.</span>
    </div>

    <div class="register-link">
      ¿No tienes cuenta? <a href="/register">Regístrate gratis</a>
    </div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
// Mini Three.js background
const canvas = document.getElementById('bg');
const renderer = new THREE.WebGLRenderer({canvas, alpha:true, antialias:true});
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setClearColor(0x020817, 1);
const scene = new THREE.Scene();
const cam = new THREE.PerspectiveCamera(75, innerWidth/innerHeight, .1, 1000);
cam.position.z = 50;
const count = 800;
const pos = new Float32Array(count*3);
const col = new Float32Array(count*3);
for(let i=0;i<count;i++){const i3=i*3;pos[i3]=(Math.random()-.5)*200;pos[i3+1]=(Math.random()-.5)*150;pos[i3+2]=(Math.random()-.5)*100;col[i3]=.02;col[i3+1]=.3+Math.random()*.3;col[i3+2]=.7+Math.random()*.3;}
const geo = new THREE.BufferGeometry();
geo.setAttribute('position',new THREE.BufferAttribute(pos,3));
geo.setAttribute('color',new THREE.BufferAttribute(col,3));
const pts = new THREE.Points(geo,new THREE.PointsMaterial({size:1,vertexColors:true,transparent:true,opacity:.6}));
scene.add(pts);
(function loop(){requestAnimationFrame(loop);pts.rotation.y+=.0003;renderer.render(scene,cam);})();
window.addEventListener('resize',()=>{cam.aspect=innerWidth/innerHeight;cam.updateProjectionMatrix();renderer.setSize(innerWidth,innerHeight);});

// Check for URL params (verified, error messages)
const params = new URLSearchParams(location.search);
const alertEl = document.getElementById('alert-container');
function showAlert(msg, type='error') {
  alertEl.innerHTML = `<div class="alert alert-${type}"><span>${type==='error'?'⚠️':type==='success'?'✅':'ℹ️'}</span>${msg}</div>`;
}
if (params.get('verified')) showAlert('¡Cuenta verificada exitosamente! Ya puedes iniciar sesión.', 'success');
if (params.get('error') === 'session_expired') showAlert('Tu sesión expiró. Por favor vuelve a iniciar sesión.', 'info');
if (params.get('message') === 'already_verified') showAlert('Tu cuenta ya estaba verificada. Inicia sesión.', 'info');

// Toggle password visibility
document.getElementById('togglePwd').addEventListener('click', () => {
  const pwd = document.getElementById('password');
  const btn = document.getElementById('togglePwd');
  if (pwd.type === 'password') { pwd.type = 'text'; btn.textContent = '🙈'; }
  else { pwd.type = 'password'; btn.textContent = '👁️'; }
});

// Login form
document.getElementById('loginForm').addEventListener('submit', async e => {
  e.preventDefault();
  const btn = document.getElementById('submitBtn');
  btn.classList.add('loading'); btn.disabled = true;
  alertEl.innerHTML = '';

  const email = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;

  try {
    const res = await fetch('/auth/login', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      credentials: 'include',
      body: JSON.stringify({email, password})
    });
    const data = await res.json();

    if (!res.ok) {
      if (data.code === 'NOT_VERIFIED') {
        showAlert(`Verifica tu correo antes de iniciar sesión. <a href="/verify" style="color:#00d4ff">Reenviar verificación</a>`, 'error');
      } else {
        showAlert(data.error || 'Error al iniciar sesión');
        document.getElementById('email').classList.add('error');
        document.getElementById('password').classList.add('error');
      }
    } else {
      showAlert('¡Bienvenido! Redirigiendo...', 'success');
      const redirect = params.get('redirect') || '/dashboard';
      setTimeout(() => window.location.href = redirect, 800);
    }
  } catch {
    showAlert('Error de conexión. Inténtalo de nuevo.');
  } finally {
    btn.classList.remove('loading'); btn.disabled = false;
  }
});

// Clear error on input
['email','password'].forEach(id => {
  document.getElementById(id).addEventListener('input', () => {
    document.getElementById(id).classList.remove('error');
  });
});
</script>
</body>
</html>
